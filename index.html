<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyodullo | Link Hub</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        textdark: '#111111',
                        textgray: '#71717a',
                    },
                    animation: {
                        'blob': 'blob 10s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(40px, -60px) scale(1.1)' },
                            '66%': { transform: 'translate(-30px, 30px) scale(0.95)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .magic-card {
                @apply relative w-full overflow-hidden rounded-[24px] p-[1px] transition-all duration-[400ms] hover:-translate-y-[2px] cursor-pointer group shadow-[0_4px_20px_rgb(0,0,0,0.02)] hover:shadow-[0_12px_30px_rgb(0,0,0,0.06)];
            }
            .magic-card-inner {
                @apply relative bg-white/70 backdrop-blur-2xl w-full h-full rounded-[23px] p-4 flex items-center gap-4 z-10 border border-white/80 transition-all duration-[400ms] group-hover:bg-white/95 group-hover:border-transparent;
            }
            .magic-icon-box {
                @apply w-12 h-12 flex-shrink-0 flex items-center justify-center rounded-[14px] bg-gray-50/80 backdrop-blur-md shadow-[inset_0_2px_4px_rgba(255,255,255,0.7),0_1px_2px_rgba(0,0,0,0.05)] border border-gray-100/60 transition-all duration-300 group-hover:scale-[1.08] group-hover:shadow-[inset_0_2px_4px_rgba(255,255,255,1),0_2px_8px_rgba(0,0,0,0.08)] group-hover:bg-white;
            }
        }
    </style>

    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#fafafa] text-textdark min-h-screen flex items-center justify-center py-12 px-5 relative overflow-hidden selection:bg-black selection:text-white">
    
    <!-- Ultra Modern Blurry Magic Orbs -->
    <div class="fixed inset-0 w-full h-full pointer-events-none z-0 overflow-hidden flex items-center justify-center">
        <div class="absolute top-0 right-[-10%] w-[500px] h-[500px] bg-purple-200/50 rounded-full mix-blend-multiply filter blur-[100px] opacity-60 animate-blob"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[600px] h-[600px] bg-blue-200/50 rounded-full mix-blend-multiply filter blur-[100px] opacity-60 animate-blob" style="animation-delay: 2s;"></div>
        <div class="absolute top-[30%] left-[20%] w-[400px] h-[400px] bg-pink-100/50 rounded-full mix-blend-multiply filter blur-[100px] opacity-60 animate-blob" style="animation-delay: 4s;"></div>
    </div>

    <main class="w-full max-w-[440px] mx-auto z-10 fade-in-up">
        
        <!-- Profile Section -->
        <header class="text-center mb-10 relative">
            <div class="relative w-[110px] h-[110px] mx-auto mb-6 group">
                <!-- Shimmer highlight behind avatar -->
                <div class="absolute inset-[-4px] bg-gradient-to-tr from-blue-300 via-purple-300 to-pink-300 rounded-full blur-[14px] opacity-0 group-hover:opacity-75 transition-opacity duration-700 ease-out z-0"></div>
                <!-- Avatar image with distinct Magic border -->
                <img src="https://ui-avatars.com/api/?name=Ziyodullo&background=111111&color=fff&size=256&font-size=0.3&bold=true" alt="Avatar" class="relative w-full h-full object-cover rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.12)] border-[3.5px] border-white z-10 transition-transform duration-[600ms] group-hover:scale-[1.04]">
            </div>
            <h1 class="text-[28px] font-bold tracking-tight mb-2 text-textdark transition-transform duration-300 cursor-default">Ziyodullo</h1>
            <p class="text-[14px] font-semibold text-textgray flex items-center justify-center gap-[6px] uppercase tracking-[0.15em] opacity-80 cursor-default">
                Creator <span class="w-[4px] h-[4px] rounded-full bg-gray-300"></span> Developer <span class="w-[4px] h-[4px] rounded-full bg-gray-300"></span> UI/UX
            </p>
        </header>

        <!-- Links Section -->
        <section class="flex flex-col gap-4" id="links-container">
            <!-- Linklar JavaScript orqali joylanadi -->
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
