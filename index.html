<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyodullo | Link Hub</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        warmbg: '#f7f4ee', // Rasmga mos issiq fon rangi
                        cardbg: '#ffffff',
                        textdark: '#1a1a1a',
                        textgray: '#6b7280',
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .link-card {
                @apply w-full bg-white rounded-2xl p-3 flex items-center gap-4 transition-all duration-300 transform hover:-translate-y-1 hover:shadow-lg cursor-pointer;
                /* Maxsus soyalar (rasmdagidek mayin) */
                box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            }
            .icon-box {
                @apply w-12 h-12 flex-shrink-0 flex items-center justify-center bg-gray-50 rounded-xl overflow-hidden shadow-sm border border-gray-100;
            }
        }
    </style>

    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-warmbg text-textdark min-h-screen flex items-center justify-center py-12 px-5">
    
    <main class="w-full max-w-[440px] mx-auto fade-in-up">
        
        <!-- Profile Section -->
        <header class="text-center mb-8">
            <div class="relative w-24 h-24 mx-auto mb-4">
                <!-- Avatar rasmi -->
                <img src="https://ui-avatars.com/api/?name=Ziyodullo&background=1a1a1a&color=fff&size=256&font-size=0.33&bold=true" alt="Avatar" class="w-full h-full object-cover rounded-full shadow-md border-4 border-white">
            </div>
            <h1 class="text-[26px] font-bold tracking-tight mb-2 text-textdark">Ziyodullo</h1>
            <p class="text-[15px] font-medium text-textgray flex items-center justify-center gap-1">
                Creator • Developer • UI/UX Designer ✨
            </p>
        </header>

        <!-- Links Section -->
        <section class="flex flex-col gap-4" id="links-container">
            <!-- Linklar shu yerga tushadi -->
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
